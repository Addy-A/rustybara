name: Build WASM

on:
  push:
    branches: [main, master]
    paths:
      - 'rustybara-wasm/**'
      - 'rustybara/src/**'
      - '.github/workflows/wasm-build.yml'

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust wasm32 target
        run: |
          rustup toolchain install stable
          rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm
        working-directory: rustybara-wasm
        run: wasm-pack build --target web --out-dir pkg --release

      - name: Deploy wasm artifact to website repo
        env:
          DEPLOY_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
        run: |
          git clone --depth=1 https://x-access-token:${DEPLOY_TOKEN}@github.com/Addy-A/rustybara-website.git _website
          mkdir -p _website/static/wasm
          cp rustybara-wasm/pkg/rustybara_wasm.js      _website/static/wasm/
          cp rustybara-wasm/pkg/rustybara_wasm_bg.wasm _website/static/wasm/
          cp rustybara-wasm/pkg/rustybara_wasm.d.ts    _website/static/wasm/
          cd _website
          git config user.name  "rustybara-ci"
          git config user.email "ci@rustybara.dev"
          git add static/wasm/
          git diff --cached --quiet || git commit -m "chore: update wasm artifact from rustybara@${{ github.sha }}"
          git push
