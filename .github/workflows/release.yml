name: release

# Cuts a GitHub Release with all rbara artifacts when a tag matching
# v* is pushed (e.g., `git tag v0.1.3 && git push --tags`).
#
# if on powershell use the below
# git tag v0.1.3 ; if ($LASTEXITCODE -eq 0) { git push --tags }
#
# Artifacts produced (one tag → one Release):
#   rbara-setup-<version>-x64.exe                    (Windows, Inno Setup)
#   rbara-<version>-linux-x64.tar.gz                 (Linux glibc, x86_64)
#   rbara-<version>-macos-arm64.tar.gz               (macOS Apple silicon)
#   rbara-<version>-macos-x86_64.tar.gz              (macOS Intel)
#   rbara:<version> + rbara:latest                   (GHCR Docker image)
#   rustybara-icc-<version>-windows-x64.exe          (ICC CLI, Windows)
#   rustybara-icc-<version>-linux-x64.tar.gz         (ICC CLI, Linux)
#   rustybara-icc-<version>-macos-arm64.tar.gz       (ICC CLI, macOS Apple silicon)
#   rustybara-icc-<version>-macos-x86_64.tar.gz      (ICC CLI, macOS Intel)
#
# ICC CLI bundled-profiles: set the ICC_PROFILES_ZIP repository secret to a
# base64-encoded ZIP of the Adobe ICC profile data directory (CMYK/ + RGB/).
# When present, the binary is built with --features bundled-profiles so named
# print profiles (--from CoatedFOGRA39 etc.) work out of the box.
# Without the secret the binary still builds; only --to srgb is available.
#
# To create the secret (PowerShell):
#   $b64 = [Convert]::ToBase64String([IO.File]::ReadAllBytes("icc-profiles.zip"))
#   # Paste $b64 into Settings → Secrets → ICC_PROFILES_ZIP
#
# Each artifact bundles its own pdfium (chromium/7776) — no system pdfium needed.
# All four installers are independent and can run/release in parallel.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.3). Must already exist.'
        required: true
        type: string

permissions:
  contents: write # create the release + upload assets
  packages: write # push the Docker image to ghcr.io

env:
  PDFIUM_CHROMIUM: '7776'

jobs:
  # -------------------------------------------------------------------------
  # Windows installer (Inno Setup .exe)
  # -------------------------------------------------------------------------
  build-windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build installer
        shell: pwsh
        run: |
          .\installer\windows\build-installer.ps1 -PdfiumChromium $env:PDFIUM_CHROMIUM

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/dist/*.exe
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Linux tarball (.tar.gz, x86_64-unknown-linux-gnu)
  # -------------------------------------------------------------------------
  build-linux:
    name: Linux tarball
    # Use ubuntu-22.04 (glibc 2.35) so the binary runs on any distro from
    # ~2022 onward (Ubuntu 22.04+, Debian 12+, RHEL 9+, Fedora 38+).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            liblcms2-dev pkg-config curl tar bc

      - name: Build installer
        run: |
          chmod +x installer/linux/build-installer.sh \
                   installer/linux/install.sh \
                   installer/linux/uninstall.sh
          ./installer/linux/build-installer.sh --pdfium-chromium "$PDFIUM_CHROMIUM"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: installer/linux/dist/*.tar.gz
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # macOS tarballs (Apple silicon + Intel)
  # -------------------------------------------------------------------------
  build-macos:
    name: macOS tarball (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14 # Apple silicon
            target: aarch64-apple-darwin
          - arch: x86_64
            # Cross-compile Intel from Apple silicon: macos-13 (Intel) runners
            # are deprecated and frequently queue-starved. pdfium ships a
            # prebuilt mac-x64 dylib, so no native Intel host is required.
            runner: macos-14
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build installer
        run: |
          chmod +x installer/macos/build-installer.sh \
                   installer/macos/install.sh \
                   installer/macos/uninstall.sh
          ./installer/macos/build-installer.sh \
            --arch "${{ matrix.arch }}" \
            --pdfium-chromium "$PDFIUM_CHROMIUM"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-tarball-${{ matrix.arch }}
          path: installer/macos/dist/*.tar.gz
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Docker image → GitHub Container Registry
  # -------------------------------------------------------------------------
  build-docker:
    name: Docker image (ghcr.io)
    runs-on: ubuntu-latest
    # Suppress the auto-uploaded "*.dockerbuild" build-record artifact from
    # docker/build-push-action — its name contains '~' which breaks
    # actions/download-artifact path handling in publish-release.
    env:
      DOCKER_BUILD_SUMMARY: 'false'
      DOCKER_BUILD_RECORD_UPLOAD: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version and image name
        id: ver
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          # GHCR requires lowercase repo names; owner login may contain uppercase.
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner_lc}/rbara" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            PDFIUM_CHROMIUM=${{ env.PDFIUM_CHROMIUM }}
          tags: |
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.version }}
            ${{ steps.ver.outputs.image }}:latest

  # -------------------------------------------------------------------------
  # GUI builds (Tauri v2)
  # -------------------------------------------------------------------------
  build-gui-windows:
    name: GUI — Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: rbara-gui/frontend
        run: npm ci

      - name: Generate placeholder icons
        shell: pwsh
        run: |
          $code = @'
          import struct, zlib, os
          def png(w, h):
              def ck(t, d):
                  x = t + d
                  return struct.pack(">I", len(d)) + x + struct.pack(">I", zlib.crc32(x) & 0xffffffff)
              ihdr = ck(b"IHDR", struct.pack(">IIBBBBB", w, h, 8, 6, 0, 0, 0))
              raw = b"".join(b"\x00" + b"\x80\x80\x80\xff" * w for _ in range(h))
              idat = ck(b"IDAT", zlib.compress(raw))
              iend = ck(b"IEND", b"")
              return b"\x89PNG\r\n\x1a\n" + ihdr + idat + iend
          os.makedirs("rbara-gui/icons", exist_ok=True)
          for name, w, h in [("icon.png",512,512),("32x32.png",32,32),("128x128.png",128,128),("128x128@2x.png",256,256)]:
              p = "rbara-gui/icons/" + name
              if not os.path.exists(p):
                  open(p, "wb").write(png(w, h))
                  print("Generated", p)
          '@
          $tmpf = [IO.Path]::GetTempFileName() + ".py"
          $code | Set-Content $tmpf -Encoding utf8
          python3 $tmpf
          Remove-Item $tmpf

      - name: Fetch pdfium (chromium/${{ env.PDFIUM_CHROMIUM }}, Windows x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F$env:PDFIUM_CHROMIUM/pdfium-win-x64.tgz"
          Invoke-WebRequest $url -OutFile pdfium.tgz
          New-Item -ItemType Directory -Force -Path "$env:TEMP\pdfium" | Out-Null
          tar -xf pdfium.tgz -C "$env:TEMP\pdfium"
          $src = "$env:TEMP\pdfium\bin\pdfium.dll"
          $dest = "rbara-gui\resources\pdfium.dll"
          if (-not (Test-Path -PathType Leaf $src)) {
            Write-Error "ERROR: $src is not a regular file in archive"
            Get-ChildItem -Recurse "$env:TEMP\pdfium" -Filter *.dll
            exit 1
          }
          New-Item -ItemType Directory -Force -Path rbara-gui\resources | Out-Null
          if (Test-Path -PathType Container $dest) { Remove-Item -Recurse -Force $dest }
          if (Test-Path $dest) { Remove-Item -Force $dest }
          Copy-Item $src $dest
          if (-not (Test-Path -PathType Leaf $dest)) {
            Write-Error "ERROR: $dest is not a regular file after copy"
            Get-ChildItem rbara-gui\resources
            exit 1
          }

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: rbara-gui
          args: --target x86_64-pc-windows-msvc

      - name: Collect installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer\gui\dist
          Get-ChildItem -Recurse target\x86_64-pc-windows-msvc\release\bundle `
            -Include *.msi, *.exe |
            Copy-Item -Destination installer\gui\dist\

      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: installer/gui/dist/*
          if-no-files-found: error

  build-gui-linux:
    name: GUI — Linux AppImage + deb
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            liblcms2-dev \
            pkg-config \
            curl tar

      - name: Install frontend dependencies
        working-directory: rbara-gui/frontend
        run: npm ci

      - name: Generate placeholder icons
        run: |
          python3 - <<'PYEOF'
          import struct, zlib, os
          def png(w, h):
              def ck(t, d):
                  x = t + d
                  return struct.pack(">I", len(d)) + x + struct.pack(">I", zlib.crc32(x) & 0xffffffff)
              ihdr = ck(b"IHDR", struct.pack(">IIBBBBB", w, h, 8, 6, 0, 0, 0))
              raw = b"".join(b"\x00" + b"\x80\x80\x80\xff" * w for _ in range(h))
              idat = ck(b"IDAT", zlib.compress(raw))
              iend = ck(b"IEND", b"")
              return b"\x89PNG\r\n\x1a\n" + ihdr + idat + iend
          os.makedirs("rbara-gui/icons", exist_ok=True)
          for name, w, h in [("icon.png",512,512),("32x32.png",32,32),("128x128.png",128,128),("128x128@2x.png",256,256)]:
              p = "rbara-gui/icons/" + name
              if not os.path.exists(p):
                  open(p, "wb").write(png(w, h))
                  print("Generated", p)
          PYEOF

      - name: Fetch pdfium (chromium/${{ env.PDFIUM_CHROMIUM }}, Linux x64)
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${PDFIUM_CHROMIUM}/pdfium-linux-x64.tgz" \
            | tar xz -C /tmp
          SRC=/tmp/lib/libpdfium.so
          DEST=rbara-gui/resources/libpdfium.so
          if [ ! -f "$SRC" ]; then
            echo "ERROR: $SRC not a regular file in archive"
            find /tmp -name '*.so*' 2>/dev/null || true
            exit 1
          fi
          mkdir -p rbara-gui/resources
          if [ -d "$DEST" ] && [ ! -L "$DEST" ]; then
            rm -rf "$DEST"
          fi
          rm -f "$DEST"
          cp "$SRC" "$DEST"
          test -f "$DEST" || { echo "ERROR: $DEST is not a regular file after copy"; ls -la rbara-gui/resources; exit 1; }

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: rbara-gui

      - name: Collect bundles
        run: |
          mkdir -p installer/gui/dist
          find target/release/bundle \
            -type f \( -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} installer/gui/dist/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: installer/gui/dist/*
          if-no-files-found: error

  build-gui-macos:
    name: GUI — macOS dmg (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
            pdfium_pkg: pdfium-mac-arm64.tgz
          - arch: x86_64
            runner: macos-14
            target: x86_64-apple-darwin
            pdfium_pkg: pdfium-mac-x64.tgz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: rbara-gui/frontend
        run: npm ci

      - name: Generate placeholder icons
        run: |
          python3 - <<'PYEOF'
          import struct, zlib, os
          def png(w, h):
              def ck(t, d):
                  x = t + d
                  return struct.pack(">I", len(d)) + x + struct.pack(">I", zlib.crc32(x) & 0xffffffff)
              ihdr = ck(b"IHDR", struct.pack(">IIBBBBB", w, h, 8, 6, 0, 0, 0))
              raw = b"".join(b"\x00" + b"\x80\x80\x80\xff" * w for _ in range(h))
              idat = ck(b"IDAT", zlib.compress(raw))
              iend = ck(b"IEND", b"")
              return b"\x89PNG\r\n\x1a\n" + ihdr + idat + iend
          os.makedirs("rbara-gui/icons", exist_ok=True)
          for name, w, h in [("icon.png",512,512),("32x32.png",32,32),("128x128.png",128,128),("128x128@2x.png",256,256)]:
              p = "rbara-gui/icons/" + name
              if not os.path.exists(p):
                  open(p, "wb").write(png(w, h))
                  print("Generated", p)
          PYEOF

      - name: Fetch pdfium (chromium/${{ env.PDFIUM_CHROMIUM }}, ${{ matrix.arch }})
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${PDFIUM_CHROMIUM}/${{ matrix.pdfium_pkg }}" \
            | tar xz -C /tmp
          SRC=/tmp/lib/libpdfium.dylib
          DEST=rbara-gui/resources/libpdfium.dylib
          if [ ! -f "$SRC" ]; then
            echo "ERROR: $SRC not a regular file in archive"
            find /tmp -name '*.dylib' 2>/dev/null || true
            exit 1
          fi
          mkdir -p rbara-gui/resources
          if [ -d "$DEST" ] && [ ! -L "$DEST" ]; then
            rm -rf "$DEST"
          fi
          rm -f "$DEST"
          cp "$SRC" "$DEST"
          test -f "$DEST" || { echo "ERROR: $DEST is not a regular file after copy"; ls -la rbara-gui/resources; exit 1; }

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: rbara-gui
          args: --target ${{ matrix.target }}

      - name: Collect dmg
        run: |
          mkdir -p installer/gui/dist
          find target/${{ matrix.target }}/release/bundle \
            -name "*.dmg" \
            -exec cp {} installer/gui/dist/rbara-gui-${{ matrix.arch }}.dmg \;

      - uses: actions/upload-artifact@v4
        with:
          name: gui-macos-${{ matrix.arch }}
          path: installer/gui/dist/*.dmg
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # rustybara-icc CLI binary (all platforms)
  # -------------------------------------------------------------------------
  build-icc-cli:
    name: rustybara-icc CLI (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rustybara-icc.exe
            archive_ext: exe
          - label: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: rustybara-icc
            archive_ext: tar.gz
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary: rustybara-icc
            archive_ext: tar.gz
          - label: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            binary: rustybara-icc
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends liblcms2-dev pkg-config

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install little-cms2

      - name: Unpack ICC profiles
        if: ${{ secrets.ICC_PROFILES_ZIP != '' }}
        shell: bash
        env:
          ICC_ZIP_B64: ${{ secrets.ICC_PROFILES_ZIP }}
        run: |
          echo "$ICC_ZIP_B64" | base64 -d > icc.zip
          python3 -c "
import zipfile
with zipfile.ZipFile('icc.zip') as z:
    z.extractall('rustybara-icc/src/profiles/data')
"

      - name: Resolve feature flags
        id: feats
        shell: bash
        env:
          ICC_ZIP_B64: ${{ secrets.ICC_PROFILES_ZIP }}
        run: |
          if [ -n "$ICC_ZIP_B64" ]; then
            echo "flags=--features bundled-profiles" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          PKG_CONFIG_ALLOW_CROSS: '1'
        run: cargo build --release -p rustybara-icc --target ${{ matrix.target }} ${{ steps.feats.outputs.flags }}

      - name: Package artifact
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          mkdir -p icc-dist
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          base="rustybara-icc-${version}-${{ matrix.label }}"
          if [ "${{ matrix.archive_ext }}" = "exe" ]; then
            cp "$src" "icc-dist/${base}.exe"
          else
            tar -czf "icc-dist/${base}.tar.gz" -C "$(dirname $src)" "$(basename $src)"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: icc-cli-${{ matrix.label }}
          path: icc-dist/*
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Publish: gather every artifact and attach to a GitHub Release
  # -------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    needs:
      [
        build-windows,
        build-linux,
        build-macos,
        build-docker,
        build-gui-windows,
        build-gui-linux,
        build-gui-macos,
        build-icc-cli,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          # Only our explicit installer artifacts. docker/build-push-action
          # auto-uploads a "*.dockerbuild" build-record artifact whose name
          # contains '~' and breaks download paths — skip it.
          pattern: '{windows-installer,linux-tarball,macos-tarball-*,gui-windows,gui-linux,gui-macos-*,icc-cli-*}'

      - name: Flatten artifact tree
        run: |
          mkdir -p release-files
          find dist -type f \( -name '*.exe' -o -name '*.tar.gz' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' \) -exec cp {} release-files/ \;
          ls -lh release-files

      - name: Generate SHA256 checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Resolve tag
        id: tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: rbara ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-files/*
          body: |
            ## rbara ${{ steps.tag.outputs.tag }}

            Pre-built installers for Windows, Linux, and macOS — each bundles
            pdfium (chromium/${{ env.PDFIUM_CHROMIUM }}) and is fully self-contained.

            ### Install

            | Platform | Asset |
            |---|---|
            | Windows | `rbara-setup-*-x64.exe` (Inno Setup, per-user) |
            | Linux (glibc x86_64) | `rbara-*-linux-x64.tar.gz` |
            | macOS (Apple silicon) | `rbara-*-macos-arm64.tar.gz` |
            | macOS (Intel) | `rbara-*-macos-x86_64.tar.gz` |
            | Docker | `ghcr.io/addy-a/rbara:${{ steps.tag.outputs.tag }}` |
            | Windows (GUI) | `rbara-gui-*_x64-setup.exe` or `rbara-gui-*.msi` |
            | Linux (GUI) | `rbara-gui-*.AppImage` or `rbara-gui-*.deb` |
            | macOS Apple silicon (GUI) | `rbara-gui-arm64.dmg` |
            | macOS Intel (GUI) | `rbara-gui-x86_64.dmg` |
            | Windows (ICC CLI) | `rustybara-icc-*-windows-x64.exe` |
            | Linux (ICC CLI) | `rustybara-icc-*-linux-x64.tar.gz` |
            | macOS Apple silicon (ICC CLI) | `rustybara-icc-*-macos-arm64.tar.gz` |
            | macOS Intel (ICC CLI) | `rustybara-icc-*-macos-x86_64.tar.gz` |

            See `SHA256SUMS.txt` for checksums.

            See the [README](https://github.com/${{ github.repository }}#installation)
            for per-platform install instructions and uninstallers.
